<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>跨时区时间转换工具</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #242736; --border: #2e3248;
      --accent: #6c8aff; --accent2: #a78bfa; --text: #e8eaf6;
      --text-muted: #7b82a6; --text-dim: #4a5180; --success: #4ade80;
      --shadow: 0 4px 24px rgba(0,0,0,0.4); --radius: 16px;
    }
    body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; min-height:100vh; padding:32px 16px 64px; }

    /* Header */
    .header { text-align:center; margin-bottom:40px; }
    .header h1 { font-size:clamp(1.6rem,4vw,2.4rem); font-weight:700; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:-0.5px; }
    .header p { color:var(--text-muted); margin-top:8px; font-size:0.95rem; }

    /* Live bar */
    .live-bar { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:36px; flex-wrap:wrap; }
    .live-dot { width:8px; height:8px; background:var(--success); border-radius:50%; animation:pulse 2s infinite; flex-shrink:0; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.4)} }
    .live-date { font-size:0.9rem; color:var(--text-muted); }
    .live-clock { font-size:1rem; font-weight:600; color:var(--text); font-variant-numeric:tabular-nums; }

    /* Slider */
    .slider-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:28px 32px; max-width:760px; margin:0 auto 40px; box-shadow:var(--shadow); }
    .slider-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:8px; }
    .slider-label { font-size:0.85rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; }
    .slider-value { font-size:1.6rem; font-weight:700; font-variant-numeric:tabular-nums; color:var(--text); }
    input[type=range] { -webkit-appearance:none; width:100%; height:6px; border-radius:3px; background:var(--border); outline:none; cursor:pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); box-shadow:0 0 0 4px rgba(108,138,255,.2); transition:box-shadow .15s; }
    input[type=range]::-webkit-slider-thumb:hover { box-shadow:0 0 0 6px rgba(108,138,255,.3); }
    input[type=range]::-moz-range-thumb { width:22px; height:22px; border:none; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); cursor:pointer; }
    .range-wrap { position:relative; }
    .range-fill { position:absolute; top:50%; left:0; height:6px; border-radius:3px 0 0 3px; background:linear-gradient(to right,var(--accent),var(--accent2)); pointer-events:none; transform:translateY(-50%); }
    .slider-ticks { display:flex; justify-content:space-between; margin-top:10px; }
    .slider-ticks span { font-size:0.72rem; color:var(--text-dim); }
    .mode-toggle { display:flex; align-items:center; gap:8px; margin-top:20px; padding-top:20px; border-top:1px solid var(--border); }
    .mode-toggle label { font-size:0.85rem; color:var(--text-muted); cursor:pointer; }
    .toggle-btn { position:relative; width:40px; height:22px; background:var(--border); border-radius:11px; border:none; cursor:pointer; transition:background .2s; }
    .toggle-btn.active { background:var(--accent); }
    .toggle-btn::after { content:''; position:absolute; top:3px; left:3px; width:16px; height:16px; border-radius:50%; background:#fff; transition:transform .2s; }
    .toggle-btn.active::after { transform:translateX(18px); }

    /* Grid */
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:20px; max-width:1100px; margin:0 auto; }

    /* Card */
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow); transition:transform .2s,border-color .2s,opacity .2s; position:relative; overflow:hidden; user-select:none; }
    .card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--card-accent,var(--accent)); border-radius:var(--radius) var(--radius) 0 0; }
    .card:not(.dragging):hover { transform:translateY(-3px); border-color:var(--card-accent,var(--accent)); }
    .card.dragging { opacity:0.2; transform:scale(0.96); }
    .card.drag-over { border-color:var(--accent)!important; box-shadow:0 0 0 2px rgba(108,138,255,.35); }
    .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
    .city-flag { font-size:1.6rem; line-height:1; margin-bottom:4px; }
    .city-name { font-size:1rem; font-weight:600; color:var(--text); }
    .city-tz { font-size:0.75rem; color:var(--text-muted); margin-top:2px; }
    .card-actions { display:flex; gap:5px; align-items:center; flex-shrink:0; }
    .copy-btn { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text-muted); font-size:0.72rem; padding:5px 10px; cursor:pointer; transition:all .15s; white-space:nowrap; }
    .copy-btn:hover { background:var(--border); color:var(--text); }
    .copy-btn.copied { background:rgba(74,222,128,.15); border-color:var(--success); color:var(--success); }
    .delete-btn { background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--text-dim); font-size:0.78rem; width:26px; height:26px; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .delete-btn:hover { background:rgba(239,68,68,.15); border-color:#ef4444; color:#ef4444; }
    .drag-handle { color:var(--text-dim); font-size:1.1rem; cursor:grab; padding:2px 3px; transition:color .15s; touch-action:none; flex-shrink:0; line-height:1; display:flex; align-items:center; }
    .drag-handle:hover { color:var(--text-muted); }
    .drag-handle:active { cursor:grabbing; }
    .card-ghost { position:fixed; pointer-events:none; z-index:1000; opacity:0.88; transform:rotate(1.5deg) scale(1.04); box-shadow:0 20px 48px rgba(0,0,0,.65); transition:none; }
    .card-time { font-size:2.6rem; font-weight:800; font-variant-numeric:tabular-nums; line-height:1; letter-spacing:-1px; color:var(--text); }
    .card-time .ampm { font-size:1rem; font-weight:500; color:var(--text-muted); margin-left:4px; letter-spacing:0; }
    .card-date { margin-top:8px; font-size:0.8rem; color:var(--text-muted); }
    .card-offset { display:inline-block; margin-top:12px; font-size:0.72rem; color:var(--text-dim); background:var(--surface2); border-radius:6px; padding:3px 8px; }
    .day-badge { display:inline-flex; align-items:center; gap:4px; margin-left:8px; font-size:0.65rem; padding:2px 7px; border-radius:20px; vertical-align:middle; }
    .day-badge.next { background:rgba(108,138,255,.15); color:var(--accent); }
    .day-badge.prev { background:rgba(167,139,250,.15); color:var(--accent2); }

    /* Add button */
    .add-btn-wrap { text-align:center; max-width:1100px; margin:24px auto 0; }
    .add-btn { background:var(--surface); border:1px dashed var(--border); border-radius:var(--radius); color:var(--text-muted); font-size:0.9rem; padding:14px 32px; cursor:pointer; transition:all .2s; width:100%; max-width:400px; }
    .add-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(108,138,255,.06); }

    /* Modal */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.72); display:flex; align-items:center; justify-content:center; z-index:900; opacity:0; pointer-events:none; transition:opacity .2s; padding:16px; }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal-box { background:var(--surface); border:1px solid var(--border); border-radius:20px; width:100%; max-width:480px; max-height:80vh; display:flex; flex-direction:column; box-shadow:0 24px 64px rgba(0,0,0,.6); transform:scale(.95); transition:transform .2s; }
    .modal-overlay.open .modal-box { transform:scale(1); }
    .modal-header { display:flex; align-items:center; justify-content:space-between; padding:20px 20px 0; }
    .modal-title { font-size:1rem; font-weight:600; color:var(--text); }
    .modal-close { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text-muted); width:30px; height:30px; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; transition:all .15s; }
    .modal-close:hover { color:var(--text); background:var(--border); }
    .modal-search-wrap { padding:14px 16px 10px; }
    .modal-search { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:0.9rem; padding:10px 14px; outline:none; transition:border-color .15s; }
    .modal-search:focus { border-color:var(--accent); }
    .modal-search::placeholder { color:var(--text-dim); }
    .modal-list { overflow-y:auto; padding:0 10px 14px; flex:1; }
    .modal-list::-webkit-scrollbar { width:4px; }
    .modal-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    .city-item { display:flex; align-items:center; gap:10px; padding:9px 8px; border-radius:10px; cursor:pointer; transition:background .12s; }
    .city-item:hover { background:var(--surface2); }
    .city-item.already { opacity:.35; pointer-events:none; }
    .city-item-flag { font-size:1.4rem; flex-shrink:0; }
    .city-item-info { flex:1; min-width:0; }
    .city-item-name { font-size:0.88rem; font-weight:600; color:var(--text); }
    .city-item-sub { font-size:0.7rem; color:var(--text-muted); margin-top:1px; }
    .city-item-tz { font-size:0.7rem; color:var(--text-dim); flex-shrink:0; }
    .city-item-add { color:var(--accent); font-size:1.2rem; flex-shrink:0; font-weight:600; }
    .city-item.already .city-item-add { color:var(--success); }
    .modal-empty { text-align:center; padding:32px 16px; color:var(--text-dim); font-size:0.85rem; }

    /* Footer */
    footer { text-align:center; margin-top:56px; color:var(--text-dim); font-size:0.78rem; }

    /* Mobile */
    @media (max-width:600px) {
      body { padding:20px 10px 48px; }
      .header { margin-bottom:24px; }
      .live-bar { margin-bottom:20px; gap:8px; }
      .slider-section { padding:16px 14px; margin-bottom:24px; }
      .slider-value { font-size:1.3rem; }
      .grid { grid-template-columns:repeat(2,1fr); gap:10px; }
      .card { padding:12px 12px 10px; border-radius:12px; }
      .card-top { margin-bottom:8px; }
      .city-flag { font-size:1.2rem; margin-bottom:2px; }
      .city-name { font-size:0.82rem; }
      .city-tz { font-size:0.68rem; }
      .copy-btn { font-size:0.62rem; padding:3px 6px; border-radius:6px; }
      .delete-btn { width:22px; height:22px; font-size:0.7rem; }
      .drag-handle { font-size:0.9rem; }
      .card-time { font-size:1.6rem; letter-spacing:-0.5px; }
      .card-time .ampm { font-size:0.78rem; }
      .card-date { font-size:0.68rem; margin-top:4px; }
      .card-offset { font-size:0.65rem; padding:2px 6px; margin-top:6px; }
      .day-badge { font-size:0.6rem; padding:1px 5px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>🌐 跨时区时间转换</h1>
  <p>拖动滑块，即时查看全球各城市时间</p>
</div>

<div class="live-bar">
  <span class="live-dot"></span>
  <span class="live-date" id="liveDate"></span>
  <span style="color:var(--text-dim)">·</span>
  <span class="live-clock" id="liveClock"></span>
</div>

<div class="slider-section">
  <div class="slider-header">
    <div>
      <div class="slider-label">选择参考时间（北京）</div>
      <div class="slider-value" id="sliderDisplay">12:00</div>
    </div>
  </div>
  <div class="range-wrap">
    <div class="range-fill" id="rangeFill"></div>
    <input type="range" id="timeSlider" min="0" max="1440" step="15" value="720" />
  </div>
  <div class="slider-ticks">
    <span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>24:00</span>
  </div>
  <div class="mode-toggle">
    <button class="toggle-btn" id="fmtToggle" title="切换12/24小时制"></button>
    <label for="fmtToggle" onclick="document.getElementById('fmtToggle').click()">12小时制</label>
  </div>
</div>

<div class="grid" id="cityGrid"></div>

<div class="add-btn-wrap">
  <button class="add-btn" id="addBtn">＋ 添加城市 / 区域</button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">🔍 添加城市</span>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-search-wrap">
      <input class="modal-search" id="modalSearch" placeholder="搜索城市、国家（支持中英文模糊搜索）…" autocomplete="off" />
    </div>
    <div class="modal-list" id="modalList"></div>
  </div>
</div>

<footer>基于原生 JavaScript · 无外部依赖 · 数据来源于 IANA 时区数据库</footer>

let use12h = false, sliderMinutes = 720, useSlider = false;

// ── Helpers ───────────────────────────────────────────────────────────────────
function pad(n) { return String(n).padStart(2,'0'); }

function getDateForCity(refMins) {
  const now = new Date();
  const bjStr = new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Shanghai',year:'numeric',month:'2-digit',day:'2-digit'}).format(now);
  const [y,m,d] = bjStr.split('-').map(Number);
  return new Date(Date.UTC(y,m-1,d,Math.floor(refMins/60)%24,refMins%60,0) - 8*3600000);
}

function formatTime(date, tz, fmt12) {
  return new Intl.DateTimeFormat('en-US',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:fmt12}).format(date);
}
function formatDate(date, tz) {
  return new Intl.DateTimeFormat('zh-CN',{timeZone:tz,month:'long',day:'numeric',weekday:'short'}).format(date);
}
function getTzOffset(tz) {
  const parts = new Intl.DateTimeFormat('en-US',{timeZone:tz,timeZoneName:'shortOffset'}).formatToParts(new Date());
  const p = parts.find(p=>p.type==='timeZoneName');
  return p ? p.value.replace('GMT','UTC') : tz;
}

// ── Build cards ───────────────────────────────────────────────────────────────
function buildCards() {
  const grid = document.getElementById('cityGrid');
  grid.innerHTML = '';
  CITIES.forEach((city, index) => {
    if (!city) return;
    const card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + city.id;
    card.dataset.id = city.id;
    card.dataset.index = index;
    card.style.setProperty('--card-accent', city.accent);
    card.innerHTML = `
      <div class="card-top">
        <div class="city-info">
          <div class="city-flag">${city.flag}</div>
          <div class="city-name">${city.name}</div>
          <div class="city-tz">${getTzOffset(city.tz)}</div>
        </div>
        <div class="card-actions">
          <button class="copy-btn" title="复制时间">复制</button>
          <button class="delete-btn" title="移除">✕</button>
          <span class="drag-handle" title="拖动排序">⠿</span>
        </div>
      </div>
      <div class="card-time" id="time-${city.id}">--:--</div>
      <div class="card-date" id="date-${city.id}">--</div>
      <div class="card-offset" id="day-${city.id}"></div>
    `;
    grid.appendChild(card);
    card.querySelector('.copy-btn').addEventListener('click', () => {
      const text = document.getElementById('time-'+city.id).textContent.trim();
      navigator.clipboard.writeText(text).then(() => {
        const btn = card.querySelector('.copy-btn');
        btn.textContent = '✓ 已复制'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 1800);
      });
    });
    card.querySelector('.delete-btn').addEventListener('click', () => {
      CITIES = CITIES.filter(c => c.id !== city.id);
      buildCards();
    });
    card.querySelector('.drag-handle').addEventListener('pointerdown', onDragStart);
  });
  updateAll();
}

// ── Drag & Drop ───────────────────────────────────────────────────────────────
let drag = { active:false, ghost:null, srcId:null, srcIdx:null, lastTarget:null, offX:0, offY:0 };

function onDragStart(e) {
  e.preventDefault();
  const card = e.currentTarget.closest('.card');
  drag.srcId = card.dataset.id;
  drag.srcIdx = parseInt(card.dataset.index);
  drag.active = true;
  const rect = card.getBoundingClientRect();
  drag.offX = e.clientX - rect.left;
  drag.offY = e.clientY - rect.top;
  const ghost = card.cloneNode(true);
  ghost.className = 'card card-ghost';
  ghost.style.cssText = `width:${rect.width}px;height:${rect.height}px;left:${rect.left}px;top:${rect.top}px;`;
  ghost.style.setProperty('--card-accent', card.style.getPropertyValue('--card-accent'));
  document.body.appendChild(ghost);
  drag.ghost = ghost;
  card.classList.add('dragging');
  document.addEventListener('pointermove', onDragMove, {passive:false});
  document.addEventListener('pointerup', onDragEnd);
}

function onDragMove(e) {
  if (!drag.active) return;
  e.preventDefault();
  drag.ghost.style.left = (e.clientX - drag.offX) + 'px';
  drag.ghost.style.top  = (e.clientY - drag.offY) + 'px';
  drag.ghost.style.display = 'none';
  const el = document.elementFromPoint(e.clientX, e.clientY);
  drag.ghost.style.display = '';
  const tc = el?.closest?.('.card[data-id]');
  if (drag.lastTarget && drag.lastTarget !== tc) drag.lastTarget.classList.remove('drag-over');
  if (tc && tc.dataset.id !== drag.srcId) { tc.classList.add('drag-over'); drag.lastTarget = tc; }
  else drag.lastTarget = null;
}

function onDragEnd() {
  if (!drag.active) return;
  drag.active = false;
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEnd);
  if (drag.ghost) { drag.ghost.remove(); drag.ghost = null; }
  if (drag.lastTarget) {
    drag.lastTarget.classList.remove('drag-over');
    const destIdx = parseInt(drag.lastTarget.dataset.index);
    const [item] = CITIES.splice(drag.srcIdx, 1);
    CITIES.splice(destIdx, 0, item);
    buildCards();
  }
  document.querySelectorAll('.card.dragging').forEach(c => c.classList.remove('dragging'));
}

// ── Update display ────────────────────────────────────────────────────────────
function updateAll() {
  const refDate = useSlider ? getDateForCity(sliderMinutes) : new Date();
  document.getElementById('sliderDisplay').textContent = formatTime(refDate, 'Asia/Shanghai', false);
  if (!useSlider) {
    const parts = new Intl.DateTimeFormat('en-US',{timeZone:'Asia/Shanghai',hour:'2-digit',minute:'2-digit',hour12:false}).format(refDate).split(':');
    const mins = Math.round((parseInt(parts[0])*60+parseInt(parts[1]))/15)*15;
    sliderMinutes = mins;
    document.getElementById('timeSlider').value = mins;
    updateFill(mins);
  }
  const bjDateStr = new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Shanghai',year:'numeric',month:'2-digit',day:'2-digit'}).format(refDate);
  CITIES.forEach(city => {
    if (!city || !document.getElementById('time-'+city.id)) return;
    const timeStr = formatTime(refDate, city.tz, use12h);
    const dateStr = formatDate(refDate, city.tz);
    const cityDate = new Intl.DateTimeFormat('en-CA',{timeZone:city.tz,year:'numeric',month:'2-digit',day:'2-digit'}).format(refDate);
    const diff = Math.round((new Date(cityDate) - new Date(bjDateStr)) / 86400000);
    const badge = diff > 0 ? `<span class="day-badge next">+${diff}天</span>` : diff < 0 ? `<span class="day-badge prev">${diff}天</span>` : '';
    const timeEl = document.getElementById('time-'+city.id);
    if (use12h) {
      const m = timeStr.match(/^(\d+:\d+)\s*(AM|PM)$/i);
      timeEl.innerHTML = m ? `${m[1]}<span class="ampm">${m[2]}</span>` : timeStr;
    } else { timeEl.textContent = timeStr; }
    document.getElementById('date-'+city.id).innerHTML = dateStr + badge;
    document.getElementById('day-'+city.id).textContent = getTzOffset(city.tz);
  });
}

function updateLiveClock() {
  const now = new Date();
  document.getElementById('liveClock').textContent = new Intl.DateTimeFormat('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(now);
  document.getElementById('liveDate').textContent = new Intl.DateTimeFormat('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'}).format(now);
}
function updateFill(val) { document.getElementById('rangeFill').style.width = (val/1440*100)+'%'; }

// ── Modal & Fuzzy Search ──────────────────────────────────────────────────────
function fuzzyMatch(query, target) {
  if (!query) return true;
  target = target.toLowerCase();
  query = query.toLowerCase().trim();
  if (target.includes(query)) return true;
  let qi = 0;
  for (let i = 0; i < target.length && qi < query.length; i++) { if (target[i]===query[qi]) qi++; }
  return qi === query.length;
}

function renderModalList(query) {
  const list = document.getElementById('modalList');
  const activeIds = new Set(CITIES.map(c => c.id));
  const results = ALL_CITIES.filter(c =>
    fuzzyMatch(query, c.name) || fuzzyMatch(query, c.nameEn) || fuzzyMatch(query, c.country)
  );
  if (!results.length) { list.innerHTML = '<div class="modal-empty">没有找到匹配的城市 😕</div>'; return; }
  list.innerHTML = results.map(c => {
    const has = activeIds.has(c.id);
    return `<div class="city-item${has?' already':''}" data-id="${c.id}">
      <span class="city-item-flag">${c.flag}</span>
      <div class="city-item-info">
        <div class="city-item-name">${c.name} <span style="font-weight:400;color:var(--text-dim);font-size:0.7rem">${c.nameEn}</span></div>
        <div class="city-item-sub">${c.country}</div>
      </div>
      <span class="city-item-tz">${getTzOffset(c.tz)}</span>
      <span class="city-item-add">${has?'✓':'＋'}</span>
    </div>`;
  }).join('');
  list.querySelectorAll('.city-item:not(.already)').forEach(el => {
    el.addEventListener('click', () => {
      const city = ALL_CITIES.find(c => c.id === el.dataset.id);
      if (city && !CITIES.find(c => c.id === city.id)) {
        CITIES.push(city); buildCards();
        renderModalList(document.getElementById('modalSearch').value);
      }
    });
  });
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  const inp = document.getElementById('modalSearch');
  inp.value = ''; renderModalList('');
  setTimeout(() => inp.focus(), 120);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

// ── Events ────────────────────────────────────────────────────────────────────
const slider = document.getElementById('timeSlider');
slider.addEventListener('input', () => { useSlider=true; sliderMinutes=parseInt(slider.value); updateFill(sliderMinutes); updateAll(); });
slider.addEventListener('dblclick', () => { useSlider=false; updateAll(); });
document.getElementById('fmtToggle').addEventListener('click', function(){ use12h=!use12h; this.classList.toggle('active',use12h); updateAll(); });
document.getElementById('addBtn').addEventListener('click', openModal);
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target===document.getElementById('modalOverlay')) closeModal(); });
document.getElementById('modalSearch').addEventListener('input', e => renderModalList(e.target.value));
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ── Init ──────────────────────────────────────────────────────────────────────
buildCards();
updateLiveClock();
updateFill(sliderMinutes);
setInterval(() => { updateLiveClock(); if(!useSlider) updateAll(); }, 1000);
</script>
</body>
